<link rel="stylesheet" href="style.css">

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peguita Cosas</title>
</head>
<body>

    <header>
        <h1>Cositas de la Pega</h1>
    </header>

    <main>
        <p>This is the homepage of my website, built using an index.html file.</p>

        <div id="splash-screen">
  <button id="start-btn">Enter Website</button>
</div>

<audio id="my-audio" loop>
  <source src="your-song.mp3" type="audio/mp3">
</audio>

<script>
  document.getElementById('start-btn').addEventListener('click', () => {
    // Play the audio and hide the splash screen
    document.getElementById('my-audio').play();
    document.getElementById('splash-screen').style.display = 'none';
  });
</script>
        
    </main>

    <footer>
        <p>2026 My Web Page</p>
    </footer>

</body>
</html>
